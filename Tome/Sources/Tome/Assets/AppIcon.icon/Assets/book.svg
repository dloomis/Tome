<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6b73c"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b45309"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- page block (right edge of closed book) -->
  <rect x="285" y="253" width="512" height="542" rx="36" fill="#efe5d0"/>
  <rect x="285" y="253" width="512" height="542" rx="36" fill="none" stroke="#d8c9a8" stroke-width="8"/>
  <line x1="769" y1="293" x2="769" y2="755" stroke="#d8c9a8" stroke-width="10" stroke-linecap="round"/>
  <line x1="741" y1="303" x2="741" y2="745" stroke="#e3d7ba" stroke-width="8" stroke-linecap="round"/>

  <!-- cover, offset up-left of pages -->
  <path d="M 250 228 h 481 c 23 0 41 18 41 41 v 486 c 0 23 -18 41 -41 41 h -481 c -38 0 -68 -30 -68 -68 v -430 c 0 -38 30 -68 68 -68 z" fill="url(#cover)"/>
  <!-- spine band -->
  <path d="M 250 228 c -38 0 -68 30 -68 68 v 430 c 0 38 30 68 68 68 h 53 v -566 z" fill="url(#spine)"/>
  <!-- spine hinge line -->
  <line x1="303" y1="248" x2="303" y2="775" stroke="#92400e" stroke-width="9" stroke-linecap="round" opacity="0.7"/>
</svg>
