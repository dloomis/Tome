name: Tests

# Regression tests for the destructive-path guarantees (see Tome/Tests/TomeTests):
# no WAV deleted and no vault note overwritten without verified success. Runs on
# every push and PR so a regression in these invariants can't land silently.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        # Same selection as release-dmg.yml. The Testing framework ships with
        # Xcode's toolchain, not the CommandLineTools.
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        working-directory: Tome
        run: swift build

      - name: Test
        working-directory: Tome
        run: swift test
