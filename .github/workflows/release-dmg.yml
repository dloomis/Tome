name: Build macOS DMG

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish (e.g. v1.3.0)"
        required: true
        type: string
  release:
    types: [published]

jobs:
  build-macos:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Build the tagged commit: a release event supplies the tag; a manual
          # dispatch supplies it via the `tag` input (forks don't fire release events).
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s /Applications/Xcode.app
          swift --version

      - name: Set version from tag
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          VERSION="${TAG#v}"
          PLIST="Tome/Sources/Tome/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$PLIST"
          echo "Set version to $VERSION"

      - name: Check for signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        run: |
          if [[ -n "$MACOS_CERTIFICATE" ]]; then
            echo "HAS_CERT=true" >> "$GITHUB_ENV"
          fi

      - name: Import signing certificate
        if: env.HAS_CERT == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          CERT_FILE=$(mktemp /tmp/cert.XXXXXX.p12)
          KEYCHAIN_FILE="/tmp/build-$$-$(date +%s).keychain-db"
          KEYCHAIN_PWD=$(openssl rand -base64 32)

          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_FILE"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_FILE"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_FILE"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_FILE"

          # The Apple intermediate CA only matters for a Developer ID chain; a
          # self-signed code-signing cert is its own chain, so this is best-effort.
          if curl -fsSL "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer" -o /tmp/DeveloperIDG2CA.cer; then
            security import /tmp/DeveloperIDG2CA.cer -k "$KEYCHAIN_FILE" -T /usr/bin/codesign || true
          fi

          security import "$CERT_FILE" -P "$MACOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN_FILE"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" "$KEYCHAIN_FILE"
          security list-keychains -d user -s "$KEYCHAIN_FILE" $(security list-keychains -d user | tr -d '"')

          rm -f "$CERT_FILE" /tmp/DeveloperIDG2CA.cer

          # First code-signing identity in this ephemeral keychain — it holds only the
          # cert we just imported, so this resolves a self-signed cert (named anything)
          # or a Developer ID cert alike. build_swift_app.sh picks the signing mode from
          # the identity name (Developer ID → hardened+timestamp; otherwise stable).
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_FILE" | grep '"' | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [[ -z "$IDENTITY" ]]; then
            echo "::error::MACOS_CERTIFICATE imported but no code-signing identity was found — check the .p12 (cert + private key, Code Signing usage) and MACOS_CERTIFICATE_PWD."
            security find-identity -v -p codesigning "$KEYCHAIN_FILE" || true
            exit 1
          fi
          echo "Resolved signing identity: $IDENTITY"
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_FILE=$KEYCHAIN_FILE" >> "$GITHUB_ENV"

      - name: Build .app
        env:
          CODESIGN_IDENTITY: ${{ env.CODESIGN_IDENTITY }}
        run: |
          chmod +x scripts/build_swift_app.sh
          ./scripts/build_swift_app.sh

      - name: Build DMG
        env:
          CODESIGN_IDENTITY: ${{ env.CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          chmod +x scripts/make_dmg.sh
          ./scripts/make_dmg.sh

      - name: Cleanup keychain
        if: always()
        run: |
          if [[ -n "${KEYCHAIN_FILE:-}" ]]; then
            security delete-keychain "$KEYCHAIN_FILE" 2>/dev/null || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: Tome-dmg
          path: dist/Tome.dmg

      - name: Attach DMG to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          # Ensure a release exists for this tag (always true for a release event;
          # a dispatch may target a tag whose release was deleted or never created).
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "Tome ${TAG#v}" --generate-notes
          gh release upload "$TAG" dist/Tome.dmg --clobber

      - name: Sign DMG and update appcast
        env:
          SPARKLE_EDDSA_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Sparkle is optional. Without the EdDSA key there's nothing to sign
          # the appcast with, so skip — the DMG is already attached to the release
          # above; only in-app auto-update advertising is unavailable.
          if [[ -z "${SPARKLE_EDDSA_KEY}" ]]; then
            echo "SPARKLE_EDDSA_KEY not set — skipping appcast update (in-app auto-update won't advertise this release)."
            exit 0
          fi

          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          VERSION="${TAG#v}"
          DMG_PATH="dist/Tome.dmg"

          # Extract sign_update from Sparkle build artifacts
          SIGN_UPDATE=$(find Tome/.build/artifacts/sparkle -name "sign_update" -type f 2>/dev/null | head -1)
          if [[ -z "$SIGN_UPDATE" ]]; then
            echo "Error: sign_update not found in Sparkle artifacts"
            exit 1
          fi
          chmod +x "$SIGN_UPDATE"

          # Sign the DMG with EdDSA
          SIGN_OUTPUT=$(echo "$SPARKLE_EDDSA_KEY" | "$SIGN_UPDATE" "$DMG_PATH" --ed-key-file /dev/stdin)
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*edSignature="\([^"]*\)".*/\1/p')
          DMG_LENGTH=$(echo "$SIGN_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')

          if [[ -z "$ED_SIGNATURE" ]]; then
            echo "Error: Failed to extract EdDSA signature"
            echo "sign_update output: $SIGN_OUTPUT"
            exit 1
          fi

          echo "EdDSA signature: $ED_SIGNATURE"
          echo "DMG length: $DMG_LENGTH"

          DMG_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/Tome.dmg"
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S %z")

          # Clone gh-pages branch
          git clone --branch gh-pages --single-branch "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" /tmp/gh-pages

          # Generate appcast.xml
          cat > /tmp/gh-pages/appcast.xml <<APPCAST_EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Tome Updates</title>
              <link>https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/appcast.xml</link>
              <description>Most recent updates to Tome</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>26.0</sparkle:minimumSystemVersion>
                <enclosure url="${DMG_URL}"
                           sparkle:edSignature="${ED_SIGNATURE}"
                           length="${DMG_LENGTH}"
                           type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          APPCAST_EOF

          # Remove leading whitespace from heredoc (macOS sed)
          sed -i '' 's/^          //' /tmp/gh-pages/appcast.xml

          cd /tmp/gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "Update appcast for ${VERSION}" || echo "No changes to commit"
          git push origin gh-pages
